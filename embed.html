<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Journey of Our Dreams — Travel Globe</title>
<style>
  /* ============ Apple Liquid Glass — minimalist light mode ============ */
  :root{
    --ink:#1c2330; --muted:#6b7488; --accent:#0a84ff;
    --safe-t:env(safe-area-inset-top,0px); --safe-b:env(safe-area-inset-bottom,0px);
    --safe-l:env(safe-area-inset-left,0px); --safe-r:env(safe-area-inset-right,0px);
    /* the glass material (light) */
    --glass-bg:rgba(255,255,255,.46);
    --glass-blur:saturate(180%) blur(26px);
    --glass-stroke:rgba(255,255,255,.65);
    --glass-shadow:
      0 12px 36px rgba(60,80,120,.16),
      0 2px 8px rgba(60,80,120,.10),
      inset 0 1px 0 rgba(255,255,255,.85),
      inset 0 0 0 .5px rgba(255,255,255,.4);
    --r-lg:26px; --r-md:20px; --pill:999px;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;height:100%;overflow:hidden;color:var(--ink);
    background:linear-gradient(180deg,#f3f6fc 0%,#e7edf7 60%,#dfe7f3 100%);
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","SF Pro Display","Segoe UI",
      Roboto,Helvetica,Arial,"PingFang SC","Microsoft YaHei",sans-serif;
    -webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
  #globe{position:fixed;inset:0}

  /* reusable glass material with specular sheen */
  .glass{position:relative;background:var(--glass-bg);
    -webkit-backdrop-filter:var(--glass-blur);backdrop-filter:var(--glass-blur);
    border:.5px solid var(--glass-stroke);border-radius:var(--r-lg);
    box-shadow:var(--glass-shadow);isolation:isolate}
  .glass::before{content:"";position:absolute;inset:0;border-radius:inherit;pointer-events:none;z-index:-1;
    background:linear-gradient(180deg,rgba(255,255,255,.65),rgba(255,255,255,0) 42%);opacity:.9}

  /* ---- loader ---- */
  #loader{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
    gap:16px;background:radial-gradient(120% 90% at 50% 35%,#f6f8fd,#e4ebf6);z-index:60;transition:opacity .6s}
  #loader.hide{opacity:0;pointer-events:none}
  .spin{width:40px;height:40px;border:3px solid rgba(60,80,120,.14);border-top-color:var(--accent);
    border-radius:50%;animation:r 1s linear infinite}
  @keyframes r{to{transform:rotate(360deg)}}
  #loader small{color:var(--muted);font-size:13px;letter-spacing:.2px}

  /* ---- top bar ---- */
  .topbar{position:fixed;z-index:30;top:calc(14px + var(--safe-t));left:calc(14px + var(--safe-l));
    right:calc(14px + var(--safe-r));display:flex;gap:10px;align-items:flex-start;justify-content:space-between;
    pointer-events:none}
  .topbar>*{pointer-events:auto}
  .chip{padding:11px 16px;max-width:min(70vw,440px)}
  .chip h1{margin:0;font-size:15px;font-weight:600;letter-spacing:.2px;line-height:1.2}
  .chip p{margin:3px 0 0;font-size:12px;color:var(--muted)}
  .chip a{color:var(--accent);text-decoration:none;font-weight:500}
  .stats{display:flex;gap:8px;flex:none}
  .stat{padding:9px 14px;text-align:center;min-width:62px}
  .stat b{display:block;font-size:19px;line-height:1;color:var(--ink);font-weight:600;letter-spacing:.3px}
  .stat span{font-size:9.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;margin-top:3px;display:block}

  /* ---- bottom controls ---- */
  .controls{position:fixed;z-index:30;left:calc(14px + var(--safe-l));bottom:calc(14px + var(--safe-b));
    display:flex;flex-direction:column;gap:9px;max-width:min(62vw,360px)}
  .searchwrap{display:flex;align-items:center;gap:8px;padding:0 6px 0 14px;height:46px;border-radius:var(--pill)}
  .searchwrap svg{flex:none;opacity:.7}
  #search{flex:1;background:none;border:0;outline:none;color:var(--ink);font-size:15px;font-family:inherit;height:100%}
  #search::placeholder{color:var(--muted)}
  .clear{width:30px;height:30px;border-radius:var(--pill);border:0;background:rgba(20,30,50,.08);color:var(--ink);
    font-size:15px;cursor:pointer;display:none;align-items:center;justify-content:center}
  .legend{display:flex;flex-wrap:wrap;gap:5px 13px;padding:9px 14px;font-size:11px;color:var(--muted)}
  .legend span{display:inline-flex;align-items:center;white-space:nowrap}
  .legend i{width:9px;height:9px;border-radius:50%;margin-right:5px;box-shadow:0 0 6px currentColor}
  .hint{position:fixed;z-index:30;right:calc(14px + var(--safe-r));bottom:calc(14px + var(--safe-b));
    padding:9px 14px;font-size:11.5px;color:var(--muted);border-radius:var(--pill)}

  /* ---- detail panel: side sheet (desktop) / bottom sheet (mobile) ---- */
  #scrim{position:fixed;inset:0;z-index:39;background:rgba(0,0,0,.28);opacity:0;pointer-events:none;
    transition:opacity .35s;-webkit-backdrop-filter:blur(2px);backdrop-filter:blur(2px)}
  #scrim.show{opacity:1;pointer-events:auto}
  #panel{position:fixed;z-index:40;top:calc(12px + var(--safe-t));right:12px;bottom:calc(12px + var(--safe-b));
    width:min(380px,90vw);border-radius:var(--r-lg);display:flex;flex-direction:column;overflow:hidden;
    transform:translateX(calc(100% + 24px));transition:transform .42s cubic-bezier(.32,.72,0,1)}
  #panel.open{transform:none}
  .grab{display:none}
  .ph{padding:18px 18px 13px;position:relative;flex:none}
  .ph h2{margin:0;font-size:19px;font-weight:600;letter-spacing:.2px;padding-right:38px}
  .ph .sub{margin-top:4px;font-size:12.5px;color:var(--muted)}
  .ph .x{position:absolute;top:16px;right:14px;width:30px;height:30px;border-radius:var(--pill);cursor:pointer;
    display:flex;align-items:center;justify-content:center;color:var(--ink);font-size:15px;
    background:rgba(20,30,50,.07);border:.5px solid rgba(20,30,50,.10)}
  .ph .x:active{transform:scale(.92)}
  .plist{overflow-y:auto;-webkit-overflow-scrolling:touch;padding:6px 10px calc(12px + var(--safe-b));flex:1}
  .post{display:flex;gap:13px;padding:10px;border-radius:16px;text-decoration:none;color:var(--ink);
    transition:background .15s,transform .1s}
  .post:active{transform:scale(.985)}
  @media(hover:hover){.post:hover{background:rgba(10,90,200,.07)}}
  .post img{width:64px;height:64px;border-radius:13px;object-fit:cover;flex:none;background:#dde5f1;
    box-shadow:inset 0 0 0 .5px rgba(20,40,80,.10)}
  .post .t{font-size:13.5px;font-weight:600;line-height:1.3}
  .post .d{font-size:11.5px;color:var(--muted);margin-top:4px}

  ::-webkit-scrollbar{width:7px}::-webkit-scrollbar-thumb{background:rgba(120,140,180,.35);border-radius:8px}

  /* ============ mobile ============ */
  @media(max-width:600px){
    :root{--r-lg:24px}
    .chip h1{font-size:14px}.chip p{font-size:11px}
    .stat{min-width:54px;padding:8px 11px}.stat b{font-size:17px}
    .controls{max-width:none;right:calc(14px + var(--safe-r));bottom:calc(14px + var(--safe-b))}
    .legend{max-height:62px;overflow-y:auto}
    .hint{display:none}
    /* bottom sheet */
    #panel{top:auto;left:0;right:0;bottom:0;width:100%;max-height:78dvh;
      border-radius:26px 26px 0 0;transform:translateY(calc(100% + 24px))}
    #panel.open{transform:none}
    .grab{display:block;width:38px;height:5px;border-radius:99px;background:rgba(40,60,90,.22);
      margin:9px auto 2px;flex:none}
    .ph{padding-top:6px}
  }
  @media(max-width:380px){.stats .stat:first-child{display:none}.chip{max-width:60vw}}
</style>
</head>
<body>
<div id="globe"></div>

<div id="loader"><div class="spin"></div><small id="lmsg">Loading the globe…</small></div>

<div class="topbar">
  <div class="chip glass">
    <h1>🌍 Journey of Our Dreams</h1>
    <p><span id="cCount">—</span> places · <a href="https://www.journeyofourdreams.com/blog" target="_blank" rel="noopener">visit the blog ↗</a></p>
  </div>
  <div class="stats">
    <div class="stat glass"><b id="sPosts">—</b><span>Posts</span></div>
    <div class="stat glass"><b id="sCountries">—</b><span>Countries</span></div>
  </div>
</div>

<div class="controls">
  <div class="searchwrap glass">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
    <input id="search" placeholder="Search a place or country" autocomplete="off" enterkeyhint="search"/>
    <button class="clear" id="clearBtn" aria-label="Clear">×</button>
  </div>
  <div class="legend glass" id="legend"></div>
</div>
<div class="hint glass">Drag to spin · scroll to zoom · click a pin</div>

<div id="scrim" onclick="closePanel()"></div>
<aside id="panel" class="glass">
  <div class="grab"></div>
  <div class="ph">
    <div class="x" onclick="closePanel()" aria-label="Close">✕</div>
    <h2 id="pTitle">Location</h2>
    <div class="sub" id="pSub"></div>
  </div>
  <div class="plist" id="pList"></div>
</aside>

<script src="https://unpkg.com/globe.gl@2.34.4/dist/globe.gl.min.js"></script>
<script>
// minimalist light palette (Apple system-ish colors, tuned for a light globe)
const YEAR_COLORS = {'2018':'#34c759','2020':'#0a84ff','2021':'#5e5ce6','2022':'#ff375f',
  '2023':'#ff9f0a','2024':'#ff6b35','2025':'#00b3a4','2026':'#d4a017'};
const colorForYear = y => YEAR_COLORS[y] || '#0a84ff';
// soft multi-colored pastel palette for a frosted "candy" political globe (opaque => smooth)
const PASTELS=['#cfe1fb','#c9e9d6','#d8dcf7','#ecd9ef','#f9dce6','#fde4cf','#f6ecc5',
               '#dde9c9','#cdebe9','#e7d9f6','#d9e6f2','#fbe2c8','#d6ece0','#f0dcea'];
const OCEAN='#eaf1fb', FROST_STROKE='rgba(255,255,255,.85)', VISIT_STROKE='rgba(255,255,255,.95)';
function hashStr(s){ let h=0; for(let i=0;i<s.length;i++){ h=(h*31 + s.charCodeAt(i))>>>0; } return h; }
function mixWhite(hex,t){ const n=parseInt(hex.slice(1),16),r=n>>16,g=(n>>8)&255,b=n&255,
  m=(c)=>Math.round(c+(255-c)*t); return `rgb(${m(r)},${m(g)},${m(b)})`; }
function countryFill(f, visited){
  const key=(f.properties.ISO_A3||f.properties.ADMIN||f.properties.NAME||'');
  const col=PASTELS[hashStr(key)%PASTELS.length];
  return visited ? col : mixWhite(col, 0.30);   // unvisited softened toward white => visited gently pop
}

// Bake the soft-pastel frosted political map to an equirectangular texture (drawn ONCE).
// Longitudes are unwrapped for continuity and each polygon is drawn at x, x-W, x+W so
// shapes crossing the antimeridian (Russia, Fiji, …) wrap cleanly instead of smearing.
function buildGlobeTexture(geo, isV){
  const W=4096, H=2048, cv=document.createElement('canvas');
  cv.width=W; cv.height=H;
  const g=cv.getContext('2d');
  g.fillStyle=OCEAN; g.fillRect(0,0,W,H);
  g.lineJoin='round'; g.lineCap='round';
  const project=(lng,lat)=>[ (lng+180)/360*W, (90-lat)/180*H ];
  for(const f of geo.features){
    const visited=isV(f);
    const fill=countryFill(f, visited);
    const polys = f.geometry.type==='MultiPolygon' ? f.geometry.coordinates : [f.geometry.coordinates];
    for(const poly of polys){
      const ringsPx = poly.map(ring=>{
        let prev=null, pts=[];
        for(let p of ring){
          let lng=p[0];
          if(prev!==null){ while(lng-prev>180) lng-=360; while(lng-prev<-180) lng+=360; }
          prev=lng; pts.push(project(lng,p[1]));
        }
        return pts;
      });
      for(const dx of [0,-W,W]){
        g.beginPath();
        for(const pts of ringsPx){
          g.moveTo(pts[0][0]+dx, pts[0][1]);
          for(let i=1;i<pts.length;i++) g.lineTo(pts[i][0]+dx, pts[i][1]);
          g.closePath();
        }
        g.fillStyle=fill; g.fill('evenodd');
        g.lineWidth = visited ? 2.6 : 1.6;
        g.strokeStyle = visited ? VISIT_STROKE : FROST_STROKE;
        g.stroke();
      }
    }
  }
  return cv.toDataURL('image/png');
}

let world, LOCATIONS = [], VISITED = new Set();
const $ = id => document.getElementById(id);
const setMsg = m => { const e=$('lmsg'); if(e) e.textContent=m; };

async function boot(){
  setMsg('Fetching travels…');
  const [locs, meta, geo] = await Promise.all([
    fetch('data/locations.json').then(r=>r.json()),
    fetch('data/meta.json').then(r=>r.json()),
    fetch('data/countries-50m.geojson').then(r=>r.json())
  ]);
  LOCATIONS = locs;
  VISITED = new Set(meta.visited_cc);
  $('sPosts').textContent = meta.post_count;
  $('sCountries').textContent = meta.country_count;
  $('cCount').textContent = locs.length;
  buildLegend(meta.years);

  setMsg('Rendering the globe…');
  const isV = f => VISITED.has((f.properties.ISO_A2_EH||'').toUpperCase())
                || VISITED.has((f.properties.ISO_A2||'').toUpperCase());

  // BUTTERY-SMOOTH STRATEGY: bake the entire pastel/frosted political map into ONE
  // texture (drawn once from the same geojson) instead of ~700 live country meshes.
  // Result: the country layer costs 1 draw call instead of hundreds -> GPU coasts at 60fps.
  const tex = buildGlobeTexture(geo, isV);

  world = Globe({
      rendererConfig:{ antialias:true, alpha:true, powerPreference:'high-performance' },
      animateIn:false, controlType:'orbit'
    })(document.getElementById('globe'))
    .backgroundColor('rgba(0,0,0,0)')                     // show the page's light gradient
    .showAtmosphere(true).atmosphereColor('#c7dcff').atmosphereAltitude(0.18)
    .globeImageUrl(tex)                                   // the baked soft-pastel frosted map
    .pointsData(LOCATIONS)
    .pointLat('lat').pointLng('lng')
    .pointColor(d => colorForYear(d.year))
    .pointAltitude(d => 0.02 + Math.min(d.posts.length,12)*0.006)
    .pointRadius(d => 0.18 + Math.min(d.posts.length,12)*0.03)
    .pointLabel(d => `<div class="g-tip"><b>${d.name}</b><br><span>${d.country} · ${d.posts.length} post${d.posts.length>1?'s':''}</span></div>`)
    .onPointClick(openLocation)
    .pointsMerge(false).pointsTransitionDuration(0);

  // ---- frosted glass material; baked map lives in m.map, so keep base color white ----
  const m = world.globeMaterial();
  m.color && m.color.set('#ffffff');
  if (m.specular) m.specular.set('#eaf1ff');
  m.shininess = 5; m.transparent = false; m.opacity = 1;

  // ---- ambient, even lighting: lift the dark side so the globe reads frosted & soft ----
  try{
    world.lights().forEach(l=>{
      const t=(l.type||'');
      if (t.includes('Ambient') || t.includes('Hemisphere')) { l.intensity = 3.3; l.color && l.color.set('#ffffff'); }
      else if (t.includes('Directional')) { l.intensity = 0.22; l.color && l.color.set('#ffffff'); }
    });
  }catch(e){ /* keep defaults */ }

  // ---- smooth 60fps spin ----
  // clamp pixel ratio (fill-rate is the bottleneck during rotation)
  const dpr = window.devicePixelRatio || 1;
  world.renderer().setPixelRatio(Math.min(dpr, dpr > 2 ? 1.5 : 2));

  // globe.gl uses OrbitControls (controlType:'orbit') — damping gives the inertial Apple-like glide.
  // globe.gl's render loop calls controls.update() every frame, so damping/autoRotate are honored.
  const c = world.controls();
  c.enableDamping = true; c.dampingFactor = 0.085;  // low = long smooth glide
  c.rotateSpeed = 0.62; c.zoomSpeed = 0.85; c.enablePan = false;
  c.minDistance = 130; c.maxDistance = 620;
  c.autoRotate = true; c.autoRotateSpeed = 0.5;
  let idleTimer;
  const stopSpin = ()=>{ c.autoRotate=false; clearTimeout(idleTimer);
    idleTimer=setTimeout(()=>{ if(!$('panel').classList.contains('open')) c.autoRotate=true; }, 4000); };
  ['mousedown','touchstart','wheel'].forEach(ev=>
    document.getElementById('globe').addEventListener(ev, stopSpin, {passive:true}));

  world.pointOfView({ lat:25, lng:10, altitude: window.innerWidth<600 ? 2.9 : 2.4 }, 0);
  resize(); window.addEventListener('resize', resize);
  setTimeout(()=>$('loader').classList.add('hide'), 500);
}

function resize(){ if(world) world.width(window.innerWidth).height(window.innerHeight); }

function buildLegend(years){
  $('legend').innerHTML = years.map(y=>`<span><i style="background:${colorForYear(y)};color:${colorForYear(y)}"></i>${y}</span>`).join('');
}

function openLocation(d){
  if(!d) return;
  $('pTitle').textContent = d.name;
  $('pSub').textContent = `${d.country} · ${d.posts.length} post${d.posts.length>1?'s':''}`;
  const sorted = [...d.posts].sort((a,b)=> b.ts - a.ts);
  $('pList').innerHTML = sorted.map(p=>`
    <a class="post" href="${p.url}" target="_blank" rel="noopener">
      ${p.thumb?`<img loading="lazy" src="${p.thumb}?format=140w" alt=""/>`
        :`<img alt="" src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='64' height='64'><rect width='100%' height='100%' fill='%231a2235'/></svg>"/>`}
      <div><div class="t">${esc(p.title)}</div><div class="d">${p.date}</div></div>
    </a>`).join('');
  $('panel').classList.add('open'); $('scrim').classList.add('show');
  world.controls().autoRotate=false;
  world.pointOfView({ lat:d.lat, lng:d.lng, altitude:1.4 }, 900);
}
function closePanel(){ $('panel').classList.remove('open'); $('scrim').classList.remove('show'); }
const esc = s => s.replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));

// search
const search = $('search'), clearBtn = $('clearBtn');
function findHit(q){ q=q.trim().toLowerCase(); return q && LOCATIONS.find(l=>
  l.name.toLowerCase().includes(q) || l.country.toLowerCase().includes(q)); }
search.addEventListener('input', e=>{
  clearBtn.style.display = e.target.value ? 'flex' : 'none';
  const hit = findHit(e.target.value);
  if(hit) world.pointOfView({lat:hit.lat,lng:hit.lng,altitude:1.6}, 900);
});
search.addEventListener('keydown', e=>{ if(e.key==='Enter'){ const h=findHit(e.target.value); if(h) openLocation(h); }});
clearBtn.addEventListener('click', ()=>{ search.value=''; clearBtn.style.display='none'; search.focus(); });

// swipe-down to dismiss bottom sheet on mobile
(function(){
  const panel=$('panel'); let y0=null;
  panel.addEventListener('touchstart',e=>{ if(window.innerWidth<=600) y0=e.touches[0].clientY; },{passive:true});
  panel.addEventListener('touchmove',e=>{
    if(y0===null) return; const dy=e.touches[0].clientY-y0;
    if(dy>0 && $('pList').scrollTop<=0){ panel.style.transform=`translateY(${dy}px)`; }
  },{passive:true});
  panel.addEventListener('touchend',e=>{
    if(y0===null) return; const dy=(e.changedTouches[0].clientY-y0);
    panel.style.transform=''; if(dy>110) closePanel(); y0=null;
  });
})();

// tooltip styling injected (globe.gl renders label HTML in an overlay)
const st=document.createElement('style');
st.textContent=`.g-tip{background:rgba(255,255,255,.7);-webkit-backdrop-filter:saturate(180%) blur(18px);
  backdrop-filter:saturate(180%) blur(18px);color:#1c2330;padding:7px 11px;border-radius:13px;font-size:12px;
  border:.5px solid rgba(255,255,255,.8);box-shadow:0 10px 26px rgba(60,80,120,.20),inset 0 1px 0 rgba(255,255,255,.9);
  max-width:230px;line-height:1.35;font-weight:500}.g-tip span{color:#6b7488;font-weight:400}`;
document.head.appendChild(st);

boot().catch(err=>{ console.error(err); setMsg('Could not load data. '+err.message); });
</script>
</body>
</html>

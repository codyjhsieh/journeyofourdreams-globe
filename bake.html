<!DOCTYPE html>
<html><head><meta charset="utf-8"/>
<style>html,body{margin:0;padding:0;background:#fff}canvas{display:block}</style>
</head><body>
<canvas id="c"></canvas>
<script>
// One-time generator for data/globe-texture.png — renders the soft-pastel frosted
// political map to an equirectangular canvas, identical to the old runtime bake.
// Headless-screenshot this page at 4096x2048 to capture the texture.
const PASTELS=['#cfe1fb','#c9e9d6','#d8dcf7','#ecd9ef','#f9dce6','#fde4cf','#f6ecc5',
               '#dde9c9','#cdebe9','#e7d9f6','#d9e6f2','#fbe2c8','#d6ece0','#f0dcea'];
const OCEAN='#eaf1fb', FROST_STROKE='rgba(255,255,255,.85)', VISIT_STROKE='rgba(255,255,255,.95)';
const hashStr=s=>{let h=0;for(let i=0;i<s.length;i++)h=(h*31+s.charCodeAt(i))>>>0;return h;};
const mixWhite=(hex,t)=>{const n=parseInt(hex.slice(1),16),r=n>>16,g=(n>>8)&255,b=n&255,
  m=c=>Math.round(c+(255-c)*t);return `rgb(${m(r)},${m(g)},${m(b)})`;};
const countryFill=(f,v)=>{const k=(f.properties.ISO_A3||f.properties.ADMIN||f.properties.NAME||'');
  const c=PASTELS[hashStr(k)%PASTELS.length];return v?c:mixWhite(c,0.30);};

(async()=>{
  const [meta,geo]=await Promise.all([
    fetch('data/meta.json').then(r=>r.json()),
    fetch('data/countries-50m.geojson').then(r=>r.json())
  ]);
  const VIS=new Set(meta.visited_cc);
  const isV=f=>VIS.has((f.properties.ISO_A2_EH||'').toUpperCase())||VIS.has((f.properties.ISO_A2||'').toUpperCase());
  const W=parseInt((location.hash||'').slice(1))||4096, H=W/2;   // #8192 -> 8192x4096
  const cv=document.getElementById('c'); cv.width=W; cv.height=H;
  const g=cv.getContext('2d');
  g.fillStyle=OCEAN;g.fillRect(0,0,W,H);g.lineJoin='round';g.lineCap='round';
  const project=(lng,lat)=>[(lng+180)/360*W,(90-lat)/180*H];
  for(const f of geo.features){
    const v=isV(f),fill=countryFill(f,v);
    const polys=f.geometry.type==='MultiPolygon'?f.geometry.coordinates:[f.geometry.coordinates];
    for(const poly of polys){
      const ringsPx=poly.map(ring=>{let prev=null,pts=[];for(let p of ring){let lng=p[0];
        if(prev!==null){while(lng-prev>180)lng-=360;while(lng-prev<-180)lng+=360;}prev=lng;pts.push(project(lng,p[1]));}return pts;});
      for(const dx of [0,-W,W]){
        g.beginPath();
        for(const pts of ringsPx){g.moveTo(pts[0][0]+dx,pts[0][1]);for(let i=1;i<pts.length;i++)g.lineTo(pts[i][0]+dx,pts[i][1]);g.closePath();}
        g.fillStyle=fill;g.fill('evenodd');
        g.lineWidth=v?2.6:1.6;g.strokeStyle=v?VISIT_STROKE:FROST_STROKE;g.stroke();
      }
    }
  }
  document.title='BAKED';
})();
</script>
</body></html>
